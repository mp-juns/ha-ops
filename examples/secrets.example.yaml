# Copy this file to secrets.yaml and fill in your real values.
# Never commit secrets.yaml.

# Network
pc_mac_address: "AA:BB:CC:DD:EE:FF"
pc_broadcast_address: "192.168.0.255"
pc_internal_ip: "192.168.0.100"
ssh_username: "YOUR_WINDOWS_SSH_USER"
ssh_private_key_path: "/config/ssh_keys/id_ed25519"

# SSL
ssl_certificate_path: "/ssl/fullchain.pem"
ssl_key_path: "/ssl/privkey.pem"

# LLM / Vision Providers
llmvision_provider_id: "YOUR_LLMVISION_PROVIDER_ID"
openai_api_key: "YOUR_OPENAI_API_KEY"
gemini_api_key: "YOUR_GEMINI_API_KEY"

# Cameras
living_room_camera_entity: "camera.your_living_room_camera"
kitchen_camera_entity: "camera.your_kitchen_camera"
ptz_camera_entity: "camera.your_ptz_camera"
ptz_preset_entity: "select.your_camera_preset_select"

# Calendar
daily_report_calendar_entity: "calendar.your_daily_report_calendar"

# Device entities
living_room_light_switch_entity: "switch.your_living_room_light"
living_room_bot_entity: "switch.your_switchbot_bot"
dehumidifier_entity: "humidifier.your_dehumidifier"
